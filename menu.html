<style>
:root {
  --bg: #F5EFE0;
  --bg-card: #FBF7EC;
  --bg-deep: #E8DFC8;
  --ink: #1A1814;
  --ink-soft: #5C544A;
  --ink-mute: #8B8273;
  --gold: #B8985A;
  --gold-deep: #8E7340;
  --line: #D9CFB4;
  --accent: #6B2C2C;
  --green: #6B9F4A;
  --shadow: 0 1px 0 rgba(26,24,20,.04), 0 4px 14px -6px rgba(26,24,20,.10);
  --shadow-lg: 0 2px 0 rgba(26,24,20,.04), 0 18px 40px -16px rgba(26,24,20,.20);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Karla', system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: 100px;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle at 1px 1px, rgba(184,152,90,.08) 1px, transparent 0);
  background-size: 22px 22px;
  pointer-events: none;
  z-index: 0;
}
.wrap { max-width: 600px; margin: 0 auto; padding: 28px 18px 0; position: relative; z-index: 1; }

header { text-align: center; padding: 12px 8px 24px; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
.eyebrow { font-size: 11px; letter-spacing: .28em; text-transform: uppercase; color: var(--gold-deep); font-weight: 600; margin-bottom: 14px; }
.logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 54px; height: 54px; border: 1.5px solid var(--gold); border-radius: 50%; margin-bottom: 12px; }
.logo-mark span { font-family: 'Fraunces', serif; font-weight: 600; font-size: 26px; color: var(--gold-deep); line-height: 1; padding-top: 2px; }
h1 { font-family: 'Fraunces', serif; font-weight: 500; font-size: 38px; line-height: 1.05; margin: 0 0 8px; letter-spacing: -.01em; font-variation-settings: "opsz" 144; }
h1 em { font-style: italic; color: var(--gold-deep); font-weight: 400; }
.sub { font-size: 13px; color: var(--ink-soft); letter-spacing: .04em; }
.sub .dot { color: var(--gold); margin: 0 8px; }

.name-block {
  background: var(--bg-card); border: 1px solid var(--line); border-radius: 16px;
  padding: 16px 16px 14px; margin-bottom: 18px;
  box-shadow: var(--shadow);
}
.name-label { font-size: 11px; letter-spacing: .2em; text-transform: uppercase; color: var(--gold-deep); font-weight: 600; margin-bottom: 8px; }
.name-input {
  width: 100%; border: none; background: transparent;
  font-family: 'Fraunces', serif; font-weight: 500; font-size: 26px;
  color: var(--ink); outline: none;
  font-variation-settings: "opsz" 36; padding: 0;
}
.name-input::placeholder { color: var(--ink-mute); font-style: italic; font-weight: 400; }
.name-hint { font-size: 12px; color: var(--ink-mute); margin-top: 6px; min-height: 18px; }
.name-hint.edit { color: var(--gold-deep); }
.name-hint.edit::before { content: '✎ '; }
.name-hint.error { color: var(--accent); font-weight: 600; }
.name-hint.error::before { content: '⚠ '; }
.name-block.pulse {
  animation: pulse-error .6s ease;
}
@keyframes pulse-error {
  0%, 100% { box-shadow: var(--shadow); border-color: var(--line); }
  50% { box-shadow: 0 0 0 4px rgba(107,44,44,.15); border-color: var(--accent); }
}

.legend {
  display: flex; flex-direction: column; gap: 8px;
  background: linear-gradient(135deg, rgba(107,159,74,.10), rgba(184,152,90,.06));
  border: 1px solid rgba(107,159,74,.30);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 18px;
}
.legend-row { display: flex; align-items: center; gap: 10px; }
.legend-marker { flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.legend-marker.green {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 3px rgba(107,159,74,.18);
}
.legend-marker.slovak {
  width: 24px; height: 16px; border-radius: 2px;
  background: linear-gradient(to bottom, #fff 0 33.3%, #0B4EA2 33.3% 66.6%, #EE1C25 66.6% 100%);
  box-shadow: 0 0 0 1px rgba(11,78,162,.20);
}
.legend-label { font-size: 13px; color: var(--ink-soft); }
.legend-label strong {
  font-family: 'Fraunces', serif; font-weight: 500;
  color: var(--ink);
  font-variation-settings: "opsz" 14;
}

.counter-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: var(--bg);
  padding: 6px 12px 6px 8px; border-radius: 100px;
  font-size: 12px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase;
}
.counter-pill .dot { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }
.counter-pill.zero { background: var(--bg-deep); color: var(--ink-mute); }
.counter-pill.zero .dot { background: var(--ink-mute); }

.cat-title { font-family: 'Fraunces', serif; font-size: 13px; letter-spacing: .22em; text-transform: uppercase; color: var(--ink-mute); font-weight: 500; margin: 32px 0 14px; display: flex; align-items: center; gap: 12px; }
.cat-title::before, .cat-title::after { content: ''; flex: 1; height: 1px; background: var(--line); }

.dish {
  display: flex; gap: 12px;
  background: var(--bg-card); border: 1px solid var(--line);
  border-radius: 14px; padding: 14px;
  cursor: pointer; margin-bottom: 8px;
  transition: all .15s ease;
  position: relative;
  user-select: none; -webkit-user-select: none;
}
.dish:active { transform: scale(.99); }
.dish.selected {
  border-color: var(--gold);
  background: #fff;
  box-shadow: 0 0 0 2px rgba(184,152,90,.15);
}
.menu-locked .dish {
  opacity: .5;
  cursor: pointer;
}
.menu-locked .dish:active { transform: none; }
.menu-locked .dish-check {
  background: var(--bg-deep);
  border-color: var(--bg-deep);
}
.dish-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 1.5px solid var(--line);
  background: var(--bg);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s ease;
  margin-top: 1px;
}
.dish.selected .dish-check {
  background: var(--gold); border-color: var(--gold);
}
.dish-check svg { width: 14px; height: 14px; color: #fff; opacity: 0; transition: opacity .15s ease; }
.dish.selected .dish-check svg { opacity: 1; }
.dish-content { flex: 1; min-width: 0; }
.dish-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
.dish-name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; color: var(--ink); line-height: 1.2; font-variation-settings: "opsz" 18; }
.dish-price { font-family: 'Fraunces', serif; font-size: 14px; font-variation-settings: "opsz" 14; color: var(--gold-deep); font-weight: 500; flex-shrink: 0; }
.dish-desc { font-size: 12.5px; color: var(--ink-soft); line-height: 1.45; }
.dish-meta { font-size: 11px; color: var(--ink-mute); margin-top: 4px; letter-spacing: .04em; }
.dish-veg {
  display: inline-block; width: 9px; height: 9px; border-radius: 50%;
  background: var(--green); margin-right: 7px; vertical-align: middle;
  box-shadow: 0 0 0 3px rgba(107,159,74,.15);
}
.dish-specialty-tag {
  display: inline-block;
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 500;
  font-size: 11.5px; color: var(--green);
  margin: 4px 0 2px;
  letter-spacing: .02em;
  font-variation-settings: "opsz" 14;
}
.dish-specialty-tag::before { content: '★ '; font-style: normal; }
.dish-slovak-flag {
  display: inline-block; vertical-align: middle;
  margin-right: 7px;
  width: 16px; height: 11px; border-radius: 2px;
  background:
    linear-gradient(to bottom, #fff 0 33.3%, #0B4EA2 33.3% 66.6%, #EE1C25 66.6% 100%);
  box-shadow: 0 0 0 1px rgba(11,78,162,.20);
  position: relative; top: -1px;
}
.dish-slovak-tag {
  display: inline-block;
  font-family: 'Fraunces', serif; font-style: italic; font-weight: 500;
  font-size: 11.5px; color: #0B4EA2;
  margin: 4px 0 2px;
  letter-spacing: .02em;
  font-variation-settings: "opsz" 14;
}
.dish-slovak-tag::before { content: '◈ '; font-style: normal; }

.bottombar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, var(--bg) 50%, rgba(245,239,224,.85) 85%, rgba(245,239,224,0));
  padding: 18px 18px calc(16px + env(safe-area-inset-bottom));
  z-index: 50;
}
.bottombar-inner { max-width: 600px; margin: 0 auto; display: flex; gap: 8px; }
.btn-primary, .btn-secondary { height: 54px; border-radius: 14px; font-family: 'Karla', sans-serif; font-weight: 600; font-size: 14px; letter-spacing: .08em; text-transform: uppercase; cursor: pointer; transition: all .15s ease; border: none; display: flex; align-items: center; justify-content: center; gap: 10px; }
.btn-primary { flex: 1; background: var(--ink); color: var(--bg); box-shadow: var(--shadow-lg); }
.btn-primary:disabled { background: var(--bg-deep); color: var(--ink-mute); box-shadow: none; cursor: not-allowed; }
.btn-primary:not(:disabled):active { transform: scale(.98); }
.btn-secondary { background: var(--bg-card); color: var(--ink); border: 1px solid var(--line); flex: 0 0 54px; }
.btn-secondary svg { width: 20px; height: 20px; }
.badge-count-inline { background: var(--gold); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 100px; font-weight: 700; letter-spacing: .04em; }

.synth-section { margin-top: 36px; padding-top: 26px; border-top: 1px solid var(--line); }
.synth-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.synth-title { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 500; font-variation-settings: "opsz" 24; }
.synth-title em { font-style: italic; color: var(--gold-deep); font-weight: 400; }
.synth-list { display: flex; flex-direction: column; gap: 8px; }
.synth-empty {
  background: var(--bg-card); border: 1px dashed var(--line); border-radius: 14px;
  padding: 28px 20px; text-align: center;
  color: var(--ink-mute); font-style: italic; font-family: 'Fraunces', serif;
  font-size: 15px;
}
.synth-card {
  background: var(--bg-card); border: 1px solid var(--line); border-radius: 14px;
  padding: 12px 14px;
}
.synth-card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 6px; }
.synth-card-name { font-family: 'Fraunces', serif; font-size: 17px; font-weight: 500; font-variation-settings: "opsz" 18; display: flex; align-items: center; gap: 8px; }
.synth-card-check { color: var(--green); }
.synth-card-actions { display: flex; gap: 4px; }
.synth-card-actions button { background: none; border: none; padding: 6px; cursor: pointer; color: var(--ink-mute); border-radius: 6px; }
.synth-card-actions button:hover { color: var(--ink); background: var(--bg); }
.synth-card-actions svg { width: 14px; height: 14px; }
.synth-card-list { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }
.synth-card-tag { display: inline-block; background: var(--bg); padding: 2px 8px; border-radius: 6px; margin: 2px 4px 2px 0; font-size: 12px; }
.synth-card-tag.cat-s { color: var(--gold-deep); }
.synth-card-tag.cat-m { color: var(--ink); font-weight: 500; }
.synth-card-tag.cat-d { color: var(--accent); }
.synth-card-total { font-size: 11px; color: var(--ink-mute); margin-top: 6px; letter-spacing: .04em; }

.sheet-backdrop { position: fixed; inset: 0; background: rgba(26,24,20,.55); z-index: 100; opacity: 0; pointer-events: none; transition: opacity .25s ease; backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }
.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  z-index: 101;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,.32,1);
  max-height: 88vh;
  display: flex; flex-direction: column;
  box-shadow: 0 -10px 40px -10px rgba(0,0,0,.25);
}
.sheet.open { transform: translateY(0); }
.sheet-grip { width: 38px; height: 4px; background: var(--line); border-radius: 4px; margin: 10px auto 0; flex-shrink: 0; }
.sheet-head { padding: 14px 20px 14px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
.sheet-title { font-family: 'Fraunces', serif; font-size: 19px; font-weight: 500; font-variation-settings: "opsz" 24; }
.sheet-title em { font-style: italic; color: var(--gold-deep); font-weight: 400; }
.sheet-close { width: 32px; height: 32px; border-radius: 50%; background: var(--bg-deep); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); flex-shrink: 0; }
.sheet-body { overflow-y: auto; padding: 12px 18px 28px; -webkit-overflow-scrolling: touch; }

.recap-cat { font-family: 'Fraunces', serif; font-style: italic; font-size: 14px; color: var(--gold-deep); letter-spacing: .04em; margin: 8px 0 8px; font-variation-settings: "opsz" 14; }
.recap-item { background: var(--bg-card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 6px; }
.recap-dish-row { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin-bottom: 4px; }
.recap-dish-name { font-family: 'Fraunces', serif; font-size: 15px; font-weight: 500; }
.recap-qty { background: var(--ink); color: var(--bg); font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 700; letter-spacing: .04em; }
.recap-guests { font-size: 12px; color: var(--ink-soft); line-height: 1.45; }
.recap-total { background: var(--ink); color: var(--bg); border-radius: 14px; padding: 14px 18px; margin: 18px 0 14px; display: flex; align-items: baseline; justify-content: space-between; }
.recap-total-label { font-size: 11px; letter-spacing: .18em; text-transform: uppercase; opacity: .7; }
.recap-total-value { font-family: 'Fraunces', serif; font-size: 24px; font-weight: 500; font-variation-settings: "opsz" 24; }
.recap-empty { text-align: center; color: var(--ink-mute); padding: 40px 20px; font-style: italic; font-family: 'Fraunces', serif; }

.danger-zone { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
.danger-btn { width: 100%; padding: 12px; border: 1px solid var(--line); background: transparent; border-radius: 10px; cursor: pointer; font-size: 12px; color: var(--ink-mute); letter-spacing: .12em; text-transform: uppercase; font-weight: 600; font-family: inherit; }
.danger-btn:hover { color: var(--accent); border-color: var(--accent); }

.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: var(--bg); padding: 10px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 200; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

footer { text-align: center; padding: 30px 0 0; font-size: 11px; color: var(--ink-mute); letter-spacing: .08em; }
footer .sep { color: var(--gold); margin: 0 8px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
.fade-up { animation: fadeUp .3s ease; }
</style>

  <div class="legend">

      <div class="legend-marker slovak"></div>
      <div class="legend-label"><strong>Spécialité locale</strong> · plat typique de la cuisine slovaque</div>

  </div>

  <div class="name-block">
    <div class="name-label">Ton prénom</div>
    <input class="name-input" id="nameInput" placeholder="Entre ton prénom…" maxlength="30" autocomplete="off">
    <div class="name-hint" id="nameHint"></div>
  </div>

  <div id="menuRoot"></div>

  <section class="synth-section">
    <div class="synth-head">
      <div class="synth-title">Qui a <em>commandé</em></div>
      <div class="counter-pill zero" id="synthCounter">
        <span class="dot"></span><span id="synthCount">0 personne</span>
      </div>
    </div>
    <div class="synth-list" id="synthList"></div>
  </section>

  <footer>
    Houdini Bratislava<span class="sep">◆</span>21–25 mai 2026

</div>

<div class="bottombar">

</div>

<div class="sheet-backdrop" id="recapBackdrop"></div>
<div class="sheet" id="recapSheet">

    </button>
  </div>
  <div class="sheet-body" id="recapBody"></div>
</div>

<div class="toast" id="toast"></div>

    { id: 'm8', name: "Longe de daim sous-vide", desc: "Confit d'oignons aux mûres, sauce aux pousses d'épicéa, purée petits pois-menthe", weight: "350 g", price: 36.00 },
    { id: 'm9', name: "Burger Houdini", desc: "Bœuf maturé haché, bacon, cornichons, chutney d'oignons, mozzarella, salade, tomate, sauce maison, frites de patate douce", weight: "400 g", price: 23.00 },

    { id: 'd2', name: "Tartelette à l'abricot", desc: "Mousse de ricotta, coulis abricot-argousier, chocolat à l'orange", weight: "100 g", price: 9.50 },
    { id: 'd3', name: "Knödel aux fraises", slovak: true, desc: "Souchet, fromage blanc, amandes, vin de paille, miel d'acacia", weight: "100 g", price: 9.50 },
    { id: 'd4', name: "Assiette de fruits frais", desc: "Fruits frais découpés", weight: "150 g", price: 7.50 }

};

const CAT_LABELS = { starter: "Entrées", main: "Plats", dessert: "Desserts" };
const STORAGE_KEY = "houdini-evg-v3";

let state = {
  current: { name: "", picks: [] },
  orders: []
};

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.orders)) state = parsed;
    }
  } catch (e) {}
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

function findDish(id) {
  for (const cat of ['starter', 'main', 'dessert']) {
    const d = MENU[cat].find(d => d.id === id);
    if (d) return { ...d, cat };
  }
  return null;
}

function existingOrder(name) {
  const n = name.trim().toLowerCase();
  if (!n) return null;
  return state.orders.find(o => o.name.trim().toLowerCase() === n);
}

const menuRoot = document.getElementById('menuRoot');

function renderMenu() {
  let html = '';
  ['starter', 'main', 'dessert'].forEach(cat => {
    html += `<div class="cat-title">${CAT_LABELS[cat]}</div>`;
    // Tri : spécialités locales d'abord
    const items = [...MENU[cat]].sort((a, b) => (b.slovak ? 1 : 0) - (a.slovak ? 1 : 0));
    items.forEach(d => {
      const selected = state.current.picks.includes(d.id);
      html += `
        <div class="dish ${selected ? 'selected' : ''}" data-id="${d.id}">
          <div class="dish-check">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div class="dish-content">
            <div class="dish-head">
              <div class="dish-name">${d.slovak ? '<span class="dish-slovak-flag" title="spécialité locale slovaque"></span>' : ''}${d.name}</div>
              <div class="dish-price">${fmtPrice(d.price)}</div>
            </div>
            ${d.slovak ? '<div class="dish-slovak-tag">Spécialité locale</div>' : ''}
            <div class="dish-desc">${d.desc}</div>
            <div class="dish-meta">${d.weight}</div>
          </div>
        </div>`;
    });
  });
  menuRoot.innerHTML = html;
  menuRoot.querySelectorAll('.dish').forEach(el => {
    el.addEventListener('click', () => toggleDish(el.dataset.id));
  });
}

function toggleDish(id) {
  // Blocage si pas de prénom
  if (!state.current.name.trim()) {
    flashNameRequired();
    return;
  }
  const i = state.current.picks.indexOf(id);
  if (i >= 0) state.current.picks.splice(i, 1);
  else state.current.picks.push(id);
  save();
  updateMenuUI();
  updateValidateBtn();
}

function flashNameRequired() {
  const block = document.querySelector('.name-block');
  nameHint.textContent = "Entre d'abord ton prénom";
  nameHint.className = 'name-hint error';
  block.classList.remove('pulse');
  void block.offsetWidth; // restart animation
  block.classList.add('pulse');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => nameInput.focus(), 350);
}

function updateMenuUI() {
  menuRoot.querySelectorAll('.dish').forEach(el => {
    el.classList.toggle('selected', state.current.picks.includes(el.dataset.id));
  });
}

const nameInput = document.getElementById('nameInput');
const nameHint = document.getElementById('nameHint');
const validateBtn = document.getElementById('validateBtn');
const validateLabel = document.getElementById('validateLabel');
const validateCount = document.getElementById('validateCount');

nameInput.addEventListener('input', () => {
  state.current.name = nameInput.value;
  const existing = existingOrder(nameInput.value);
  if (existing) {
    state.current.picks = [...existing.picks];
    nameHint.textContent = `Modification de la commande de ${existing.name}`;
    nameHint.className = 'name-hint edit';
  } else {
    nameHint.textContent = '';
    nameHint.className = 'name-hint';
  }
  save();
  updateMenuUI();
  updateMenuLock();
  updateValidateBtn();
});

function updateMenuLock() {
  const hasName = state.current.name.trim().length > 0;
  menuRoot.classList.toggle('menu-locked', !hasName);
}

function updateValidateBtn() {
  const hasName = state.current.name.trim().length > 0;
  const count = state.current.picks.length;
  const isEdit = !!existingOrder(state.current.name);
  validateBtn.disabled = !hasName || count === 0;
  validateLabel.textContent = isEdit ? 'Mettre à jour' : 'Valider ma commande';
  if (count > 0) {
    validateCount.style.display = '';
    validateCount.textContent = count;
  } else {
    validateCount.style.display = 'none';
  }
}

validateBtn.addEventListener('click', () => {
  if (validateBtn.disabled) return;
  const name = state.current.name.trim();
  const picks = [...state.current.picks];
  const existing = existingOrder(name);
  if (existing) {
    existing.picks = picks;
    existing.at = Date.now();
    showToast(`Commande de ${name} mise à jour`);
  } else {
    state.orders.push({
      id: `o${Date.now()}-${Math.random().toString(36).slice(2,6)}`,
      name, picks, at: Date.now()
    });
    showToast(`Merci ${name} ! ✓`);
  }
  state.current = { name: "", picks: [] };
  nameInput.value = "";
  nameHint.textContent = "";
  nameHint.className = 'name-hint';
  save();
  updateMenuUI();
  updateMenuLock();
  updateValidateBtn();
  renderSynthese();
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(() => nameInput.focus(), 400);
});

const synthList = document.getElementById('synthList');
const synthCount = document.getElementById('synthCount');
const synthCounter = document.getElementById('synthCounter');

function renderSynthese() {
  const n = state.orders.length;
  synthCount.textContent = n + (n <= 1 ? ' personne' : ' personnes');
  synthCounter.classList.toggle('zero', n === 0);

  if (n === 0) {
    synthList.innerHTML = `<div class="synth-empty">Personne n'a encore commandé.<br>Premier ! 👋</div>`;
    return;
  }
  const sorted = [...state.orders].sort((a, b) => a.at - b.at);
  synthList.innerHTML = sorted.map(o => {
    const total = o.picks.reduce((sum, id) => sum + (findDish(id)?.price || 0), 0);
    const tags = o.picks.map(id => {
      const d = findDish(id);
      if (!d) return '';
      const catClass = `cat-${d.cat[0]}`;
      return `<span class="synth-card-tag ${catClass}">${d.name}</span>`;
    }).join('');
    return `
      <div class="synth-card fade-up" data-id="${o.id}">
        <div class="synth-card-head">
          <div class="synth-card-name"><span class="synth-card-check">✓</span> ${escapeHtml(o.name)}</div>
          <div class="synth-card-actions">
            <button data-edit="${o.id}" title="Modifier">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button data-del="${o.id}" title="Supprimer">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            </button>
          </div>
        </div>
        <div class="synth-card-list">${tags}</div>
        <div class="synth-card-total">${o.picks.length} plat${o.picks.length>1?'s':''} · ${fmtPrice(total)}</div>
      </div>
    `;
  }).join('');

  synthList.querySelectorAll('[data-edit]').forEach(b => {
    b.addEventListener('click', () => {
      const order = state.orders.find(o => o.id === b.dataset.edit);
      if (!order) return;
      nameInput.value = order.name;
      nameInput.dispatchEvent(new Event('input'));
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  });
  synthList.querySelectorAll('[data-del]').forEach(b => {
    b.addEventListener('click', () => {
      const order = state.orders.find(o => o.id === b.dataset.del);
      if (!order) return;
      if (confirm(`Supprimer la commande de ${order.name} ?`)) {
        state.orders = state.orders.filter(o => o.id !== order.id);
        save();
        renderSynthese();
        showToast('Supprimé');
      }
    });
  });
}

const recapSheet = document.getElementById('recapSheet');
const recapBackdrop = document.getElementById('recapBackdrop');
const recapBody = document.getElementById('recapBody');

function openRecap() {
  renderRecap();
  document.body.style.overflow = 'hidden';
  recapBackdrop.classList.add('open');
  requestAnimationFrame(() => recapSheet.classList.add('open'));
}
function closeRecap() {
  document.body.style.overflow = '';
  recapSheet.classList.remove('open');
  recapBackdrop.classList.remove('open');
}
recapBackdrop.addEventListener('click', closeRecap);
document.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', closeRecap));

function renderRecap() {
  if (state.orders.length === 0) {
    recapBody.innerHTML = `<div class="recap-empty">Aucune commande encore.</div>`;
    return;
  }
  let total = 0;
  let html = '';
  ['starter', 'main', 'dessert'].forEach(cat => {
    const dishMap = new Map();
    state.orders.forEach(o => {
      o.picks.forEach(id => {
        const d = findDish(id);
        if (d && d.cat === cat) {
          if (!dishMap.has(id)) dishMap.set(id, []);
          dishMap.get(id).push(o.name);
        }
      });
    });
    if (dishMap.size === 0) return;
    html += `<div class="recap-cat">${CAT_LABELS[cat]}</div>`;
    Array.from(dishMap.entries()).forEach(([dishId, names]) => {
      const dish = findDish(dishId);
      const subTotal = dish.price * names.length;
      total += subTotal;
      html += `
        <div class="recap-item">
          <div class="recap-dish-row">
            <div class="recap-dish-name">${dish.name}</div>
            <div class="recap-qty">×${names.length}</div>
          </div>
          <div class="recap-guests">${names.map(escapeHtml).join(' · ')}</div>
        </div>`;
    });
  });
  html += `
    <div class="recap-total">
      <div class="recap-total-label">Total estimé</div>
      <div class="recap-total-value">${fmtPrice(total)}</div>
    </div>
    <button class="btn-primary" id="copyTextBtn" style="width:100%">Copier pour WhatsApp</button>
    <div class="danger-zone">
      <button class="danger-btn" id="resetAllBtn">Tout réinitialiser</button>
    </div>
  `;
  recapBody.innerHTML = html;
  document.getElementById('copyTextBtn').addEventListener('click', copyRecap);
  document.getElementById('resetAllBtn').addEventListener('click', () => {
    if (confirm('Effacer toutes les commandes ?')) {
      state.orders = [];
      state.current = { name: "", picks: [] };
      nameInput.value = "";
      save();
      renderSynthese();
      updateMenuUI();
      updateValidateBtn();
      closeRecap();
      showToast('Tout effacé');
    }
  });
}

function buildTextRecap() {
  const lines = [];
  lines.push("🍽️ MENU HOUDINI — EVG Christophe");
  lines.push("");
  let total = 0, totalCount = 0;
  ['starter', 'main', 'dessert'].forEach(cat => {
    const dishMap = new Map();
    state.orders.forEach(o => {
      o.picks.forEach(id => {
        const d = findDish(id);
        if (d && d.cat === cat) {
          if (!dishMap.has(id)) dishMap.set(id, []);
          dishMap.get(id).push(o.name);
        }
      });
    });
    if (dishMap.size === 0) return;
    lines.push(`▸ ${CAT_LABELS[cat].toUpperCase()}`);
    Array.from(dishMap.entries()).forEach(([dishId, names]) => {
      const dish = findDish(dishId);
      const subTotal = dish.price * names.length;
      total += subTotal;
      totalCount += names.length;
      lines.push(`• ${dish.name} ×${names.length}`);
      lines.push(`   → ${names.join(', ')}`);
      lines.push(`   ${fmtPrice(dish.price)} × ${names.length} = ${fmtPrice(subTotal)}`);
    });
    lines.push("");
  });
  lines.push(`💰 Total estimé : ${fmtPrice(total)}`);
  lines.push(`${totalCount} plat${totalCount>1?'s':''} · ${state.orders.length} personne${state.orders.length>1?'s':''}`);
  return lines.join('\n');
}

function copyRecap() {
  const text = buildTextRecap();
  navigator.clipboard.writeText(text).then(() => {
    showToast("Copié ! Colle dans WhatsApp");
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast("Copié !"); } catch(e) {}
    document.body.removeChild(ta);
  });
}

document.getElementById('recapBtn').addEventListener('click', openRecap);

function fmtPrice(p) { return p.toFixed(2).replace('.', ',') + ' €'; }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

load();
nameInput.value = state.current.name || '';
renderMenu();
updateMenuLock();
updateValidateBtn();
renderSynthese();
if (state.current.name) nameInput.dispatchEvent(new Event('input'));
</script>
